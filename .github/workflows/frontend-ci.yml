name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      
name: Descargar código
      uses: actions/checkout@v4

      
name: Validar archivos principales
      run: |
        test -f index.html
        test -f styles.css
        test -f app.js
        test -f validation.js

      
name: Ejecutar deploy en Render
      if: github.ref == 'refs/heads/main'
      run: curl -fsSL "$RENDER_DEPLOY_HOOK_URL"
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
